services:
  - type: web
    name: wellbeing-dashboard
    runtime: python
    rootDir: wellbeing-dashboard
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
